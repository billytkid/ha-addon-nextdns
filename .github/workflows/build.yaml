name: Build and publish add-on

on:
  push:
    branches:
      - main
    paths:
      - "nextdns/**"
      - ".github/workflows/build.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "nextdns/**"
      - ".github/workflows/build.yaml"
  release:
    types:
      - published

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:latest
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:latest
          - arch: armhf
            platform: linux/arm/v6
            base: ghcr.io/home-assistant/armhf-base:latest
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base:latest
          - arch: i386
            platform: linux/386
            base: ghcr.io/home-assistant/i386-base:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read NextDNS version
        id: build_args
        run: |
          NEXTDNS_VERSION=$(grep 'NEXTDNS_VERSION' nextdns/build.yaml | awk '{print $2}' | tr -d '"')
          echo "nextdns_version=${NEXTDNS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ha-addon-nextdns/${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./nextdns
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            NEXTDNS_VERSION=${{ steps.build_args.outputs.nextdns_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
