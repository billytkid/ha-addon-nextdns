configuration:
  profile_id:
    name: NextDNS Profile ID
    description: >-
      The ID for your NextDNS profile. Find it at my.nextdns.io → Setup tab,
      next to "ID" (e.g. 3ee52c). Just the short code — not the full URL.
  device_name:
    name: Device name
    description: >-
      A name for this device as it will appear in your NextDNS dashboard.
      Defaults to "home-assistant".
  log_queries:
    name: Log DNS queries
    description: >-
      Print every DNS query to the add-on log. Off by default — turn on
      temporarily if a site is being blocked and you want to see why.
  cache:
    name: Cache DNS responses
    description: >-
      Store recent DNS responses locally (10 MB cache). Speeds up repeated
      lookups and reduces round-trips to NextDNS. Safe to leave on.
