configuration:
  profile_id:
    name: NextDNS Profile ID
    description: >-
      The ID for your NextDNS profile. Find it at my.nextdns.io → Setup tab,
      next to "ID" (e.g. 3ee52c). Just the short code — not the full URL.
  device_name:
    name: Device name
    description: >-
      A name for this device as it will appear in your NextDNS dashboard.
      Defaults to "home-assistant".
