name: NextDNS
version: "1.1.1"
slug: nextdns
description: Run the NextDNS client as a Home Assistant add-on for network-wide DNS filtering.
url: "https://github.com/billytkid/ha-addon-nextdns"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
host_network: true
options:
  config_id: ""
  listen: "0.0.0.0:53"
  report_client_info: true
  log_queries: false
  cache_size: 0
  max_ttl: 5
  bogus_priv: true
  use_hosts: true
  forwarder: ""
schema:
  config_id: str
  listen: str
  report_client_info: bool
  log_queries: bool
  cache_size: int
  max_ttl: int
  bogus_priv: bool
  use_hosts: bool
  forwarder: str
image: "ghcr.io/billytkid/ha-addon-nextdns/{arch}"
